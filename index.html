/* ═══ CHARTS ═══ */
function useChart(ref,cfg){
  const inst=useRef(null);
  useEffect(()=>{if(!ref.current)return;if(inst.current){inst.current.destroy();inst.current=null;}try{inst.current=new Chart(ref.current,cfg);}catch(e){console.error(e);}return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};},[JSON.stringify(cfg)]);
}
function RadarC({datasets,labels}){const r=useRef();useChart(r,{type:"radar",data:{labels,datasets},options:{scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10}},pointLabels:{font:{size:9}}}},plugins:{legend:{labels:{font:{size:10}}}}}});return<canvas ref={r}/>;}
function LineC({datasets,labels}){const r=useRef();useChart(r,{type:"line",data:{labels,datasets},options:{responsive:true,scales:{y:{min:0,max:5,ticks:{stepSize:1,font:{size:10}}},x:{ticks:{font:{size:10}}}},plugins:{legend:{labels:{font:{size:10}}}}}});return<canvas ref={r}/>;}
function BarC({data,labels,color}){const r=useRef();useChart(r,{type:"bar",data:{labels,datasets:[{data,backgroundColor:color+"99",borderColor:color,borderWidth:1.5,borderRadius:4}]},options:{indexAxis:"y",responsive:true,scales:{x:{min:0,max:5,ticks:{stepSize:1,font:{size:10}}},y:{ticks:{font:{size:10}}}},plugins:{legend:{display:false}}}});return<canvas ref={r}/>;}
function ScatC({datasets}){
  var r=useRef();
  var cfg={
    type:"scatter",
    data:{datasets:datasets},
    options:{
      responsive:true,
      scales:{
        x:{type:"linear",ticks:{font:{size:9},callback:function(v){return fd(v);}}},
        y:{min:0,max:5,ticks:{stepSize:1,font:{size:10}}}
      },
      plugins:{
        legend:{labels:{font:{size:10}}},
        tooltip:{callbacks:{
          title:function(items){var d=items[0]&&items[0].raw;return d?fdt(d.x):"";},
          label:function(item){var d=item.raw;return d.y+"/5"+(d.nota?" - "+d.nota:"");}
        }}
      }
    }
  };
  useChart(r,cfg);
  return <canvas ref={r}/>;
}

function ArgFlag({size=28}){
  const rays=Array.from({length:16},(_,i)=>{const a=(i*Math.PI*2)/16,x1=30+Math.cos(a)*7,y1=20+Math.sin(a)*7,x2=30+Math.cos(a)*9.5,y2=20+Math.sin(a)*9.5;return<line key={i}x1={x1}y1={y1}x2={x2}y2={y2}stroke="#F6B40E"strokeWidth="1.4"strokeLinecap="round"/>;});
  return<svg width={size}height={size*0.66}viewBox="0 0 60 40"><rect width="60"height="40"rx="4"fill="#fff"/><rect width="60"height="13.3"rx="4"fill="#75AADB"/><rect y="26.7"width="60"height="13.3"fill="#75AADB"/><circle cx="30"cy="20"r="6"fill="#F6B40E"stroke="#85340A"strokeWidth="0.6"/>{rays}</svg>;

/* ═══ LOGIN ═══ */
function Login(){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[pass2,setPass2]=useState("");
  const[nombre,setNombre]=useState("");
  const[rolSol,setRolSol]=useState("scout");
  const[catSol,setCatSol]=useState("U19");
  const[err,setErr]=useState("");
  const[ok,setOk]=useState("");
  const[loading,setL]=useState(false);
  const[cat,setCat]=useState(null);
  const[forgotOk,setForgotOk]=useState("");

  const reset=()=>{setEmail("");setPass("");setPass2("");setNombre("");setErr("");setOk("");setForgotOk("");};

  const handleForgot=async()=>{
    if(!email){setErr("Ingresá tu email primero para recuperar la contraseña.");return;}
    setErr("");
    const redirectUrl='https://tomasgalimberti.github.io/Seleccion-Voley';const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:redirectUrl});
    if(error){setErr("No se pudo enviar el email. Verificá que el email sea correcto.");}
    else{setForgotOk("Te enviamos un email para restablecer tu contraseña. Revisá tu bandeja de entrada.");}
  };

  const handleLogin=async e=>{
    e.preventDefault();setErr("");setL(true);
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    setL(false);
    if(error)setErr(error.message.includes("Invalid")?"Email o contraseña incorrectos.":"No se pudo iniciar sesión.");
  };

  const handleSignup=async e=>{
    e.preventDefault();setErr("");
    if(!nombre.trim()){setErr("Ingresá tu nombre completo.");return;}
    if(pass.length<6){setErr("La contraseña debe tener al menos 6 caracteres.");return;}
    if(pass!==pass2){setErr("Las contraseñas no coinciden.");return;}
    setL(true);
    const{data,error}=await sb.auth.signUp({email,password:pass});
    if(error){setL(false);setErr(error.message.includes("already")?"Ese email ya tiene una cuenta.":"No se pudo crear la cuenta.");return;}
    if(data?.user){await sb.from("profiles").insert({id:data.user.id,nombre:nombre.trim(),rol:rolSol,categoria:catSol});}
    setL(false);
    setOk("Cuenta creada. Ya podés ingresar.");
    setMode("login");reset();
  };

  const inputStyle={width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#EAF4FA",outline:"none"};
  const selectStyle={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"9px 8px",fontSize:12,color:"#EAF4FA",outline:"none"};
  const labelStyle={fontSize:11,color:"rgba(255,255,255,0.4)",margin:"0 0 4px",fontWeight:500,display:"block"};

  const CATS2=[
    {id:"seleccion",label:"Staff Nacional",accent:"#3FD0E0"},
    {id:"veedor",   label:"Veedor/a",      accent:"#FFB23D"},
    {id:"club",     label:"Staff Club",    accent:"#34D399"},
    {id:"jugador",  label:"Jugador/a",     accent:"rgba(255,255,255,0.15)",soon:true},
  ];

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#D6E8F5",padding:"1.5rem"}}>
      <div style={{width:"100%",maxWidth:320,background:"#0B2235",borderRadius:18,padding:"2rem 1.75rem",boxShadow:"0 20px 60px rgba(0,0,0,0.35),0 4px 16px rgba(0,0,0,0.2)"}}>

        <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
          <FevaMark size={48}/>
          <p style={{fontSize:19,fontWeight:500,color:"#EAF4FA",margin:"10px 0 2px"}}>FeVA · Observa</p>
          <p style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:".1em",textTransform:"uppercase",margin:0}}>Selección Argentina de Vóleibol</p>
        </div>

        <div style={{display:"flex",gap:3,marginBottom:"1.25rem",background:"rgba(255,255,255,0.05)",borderRadius:8,padding:3}}>
          {[{id:"login",l:"Ingresar"},{id:"signup",l:"Crear cuenta"}].map(m=>
            <button key={m.id} onClick={()=>{setMode(m.id);reset();setCat(null);}}
              style={{flex:1,background:mode===m.id?"#1A3A56":"transparent",border:mode===m.id?"0.5px solid rgba(63,208,224,0.25)":"none",borderRadius:6,padding:"6px",fontSize:12,fontWeight:mode===m.id?500:400,color:mode===m.id?"#EAF4FA":"rgba(255,255,255,0.35)",cursor:"pointer"}}>
              {m.l}
            </button>
          )}
        </div>

        {ok&&<div style={{background:"rgba(52,211,153,0.15)",border:"0.5px solid rgba(52,211,153,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#34D399"}}>{ok}</div>}

        {mode==="login"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:"1.25rem"}}>
            {CATS2.map(c=><button key={c.id} disabled={c.soon}
              onClick={()=>setCat(p=>p?.id===c.id?null:c)}
              style={{background:cat?.id===c.id?c.accent+"20":"rgba(255,255,255,0.04)",border:cat?.id===c.id?"1px solid "+c.accent:"0.5px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 4px",textAlign:"center",fontSize:11,color:c.soon?"rgba(255,255,255,0.18)":cat?.id===c.id?"#EAF4FA":"rgba(255,255,255,0.45)",cursor:c.soon?"not-allowed":"pointer"}}>
              {c.id==="seleccion"&&<span style={{display:"flex",justifyContent:"center",marginBottom:4}}>
                <svg width="20" height="13" viewBox="0 0 60 40"><rect width="60" height="40" rx="4" fill="#fff"/><rect width="60" height="13.3" rx="4" fill="#75AADB"/><rect y="26.7" width="60" height="13.3" fill="#75AADB"/><circle cx="30" cy="20" r="5" fill="#F6B40E"/></svg>
              </span>}
              {c.id==="veedor"&&<I.Search size={18} color={cat?.id===c.id?c.accent:"rgba(255,255,255,0.4)"} className="block mx-auto mb-1"/>}
              {c.id==="club"&&<I.Shield size={18} color={cat?.id===c.id?c.accent:"rgba(255,255,255,0.4)"} className="block mx-auto mb-1"/>}
              {c.id==="jugador"&&<I.Ball size={18} color="rgba(255,255,255,0.18)" className="block mx-auto mb-1"/>}
              <span style={{display:"block",marginTop:4}}>{c.label}</span>
              {c.soon&&<span style={{fontSize:9,display:"block",marginTop:2,opacity:.6}}>Próximamente</span>}
            </button>)}
          </div>
          {cat&&!cat.soon&&<form onSubmit={handleLogin}>
            <div style={{marginBottom:8}}>
              <span style={labelStyle}>Email</span>
              <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" style={inputStyle}/>
            </div>
            <div style={{marginBottom:"1.25rem"}}>
              <span style={labelStyle}>Contraseña</span>
              <input type="password" required value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={inputStyle}/>
            </div>
            {err&&<div style={{background:"rgba(217,83,79,0.15)",border:"0.5px solid rgba(217,83,79,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#E07070"}}>{err}</div>}
            <button type="submit" disabled={loading} style={{width:"100%",background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",border:"none",borderRadius:8,padding:10,color:"white",fontWeight:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {loading&&<I.Loader size={15} color="#fff"/>}{loading?"Ingresando...":"Ingresar"}
            </button>
            <button type="button" onClick={handleForgot} style={{width:"100%",background:"none",border:"none",marginTop:8,fontSize:11,color:"rgba(255,255,255,0.35)",cursor:"pointer",textAlign:"center"}}>
              ¿Olvidaste tu contraseña?
            </button>
            {forgotOk&&<div style={{background:"rgba(52,211,153,0.12)",border:"0.5px solid rgba(52,211,153,0.25)",borderRadius:8,padding:"8px 12px",marginTop:6,fontSize:11,color:"#34D399",textAlign:"center"}}>{forgotOk}</div>}
          </form>}
        </div>}

        {mode==="signup"&&<form onSubmit={handleSignup}>
          <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",margin:"0 0 12px",lineHeight:1.5}}>
            Completá tus datos. El administrador podrá ajustar tu rol si es necesario.
          </p>
          <div style={{marginBottom:8}}>
            <span style={labelStyle}>Nombre completo *</span>
            <input type="text" required value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre y apellido" style={inputStyle}/>
          </div>
          <div style={{marginBottom:8}}>
            <span style={labelStyle}>Email *</span>
            <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" style={inputStyle}/>
          </div>
          <div style={{marginBottom:8}}>
            <span style={labelStyle}>Contraseña * (mín. 6 caracteres)</span>
            <input type="password" required value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={inputStyle}/>
          </div>
          <div style={{marginBottom:8}}>
            <span style={labelStyle}>Repetir contraseña *</span>
            <input type="password" required value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="••••••••" style={inputStyle}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:"1.25rem"}}>
            <div>
              <span style={labelStyle}>Rol</span>
              <select value={rolSol} onChange={e=>setRolSol(e.target.value)} style={selectStyle}>
                <option value="scout">Veedor/a</option>
                <option value="coach">Entrenador Club</option>
                <option value="head_coach">Entrenador Principal</option>
              </select>
            </div>
            <div>
              <span style={labelStyle}>Categoría</span>
              <select value={catSol} onChange={e=>setCatSol(e.target.value)} style={selectStyle}>
                <option value="Todas">Todas</option>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          {err&&<div style={{background:"rgba(217,83,79,0.15)",border:"0.5px solid rgba(217,83,79,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#E07070"}}>{err}</div>}
          <button type="submit" disabled={loading} style={{width:"100%",background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",border:"none",borderRadius:8,padding:10,color:"white",fontWeight:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {loading&&<I.Loader size={15} color="#fff"/>}{loading?"Creando cuenta...":"Crear cuenta"}
          </button>
        </form>}

        <p style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.18)",margin:"14px 0 0"}}>
          Acceso exclusivo para personal autorizado por FeVA
        </p>
      </div>
    </div>
  );
}



/* ═══ BÚSQUEDA GLOBAL ═══ */
function GSearch({players,onJump}){
  const[q,setQ]=useState(""),[ open,setOpen]=useState(false);
  const res=q.trim()?players.filter(p=>`${p.nombre} ${p.apellido} ${p.club||""} ${p.categoria}`.toLowerCase().includes(q.toLowerCase())).slice(0,6):[];
  return<div className="relative w-full max-w-md"><div className="absolute left-3 top-1/2 -translate-y-1/2"><I.Search size={15}color="#6E8DA3"/></div><input value={q}onChange={e=>{setQ(e.target.value);setOpen(true);}}onFocus={()=>setOpen(true)}onBlur={()=>setTimeout(()=>setOpen(false),150)}placeholder="Buscar jugador/a..."className="inp pl-9"/>{open&&q.trim()&&<div className="absolute top-full left-0 mt-2 w-full bg-white rounded-2xl border border-[#DCEEF7] shadow-2xl overflow-hidden z-50">{!res.length?<p className="text-sm text-[#6E8DA3] px-4 py-3">Sin resultados</p>:res.map(p=><button key={p.id}onMouseDown={()=>{onJump(p);setQ("");setOpen(false);}}className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-[#EAF5FA] text-left border-b border-[#EAF5FA] last:border-0 cursor-pointer"><Avatar player={p}size="sm"/><div className="min-w-0"><p className="text-sm font-semibold text-[#0B2B45] truncate">{p.nombre} {p.apellido}</p><p className="text-xs text-[#6E8DA3] truncate">{p.posicion} · {p.categoria}</p></div></button>)}</div>}</div>;
}

/* ═══ NOTIFICACIONES ═══ */
function Notifs({notifications,user,lastSeen,onMark,onJump,players}){
  const[open,setOpen]=useState(false);
  const rel=notifications.filter(n=>n.evaluadorId!==user.id).filter(n=>["admin","head_coach"].includes(user.rol)||n.categoria===user.categoria).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,15);
  const unread=rel.filter(n=>new Date(n.fecha)>new Date(lastSeen||0)).length;
  const tog=()=>{const x=!open;setOpen(x);if(x)onMark(new Date().toISOString());};
  return<div className="relative"><button onClick={tog}onBlur={()=>setTimeout(()=>setOpen(false),150)}className="relative w-9 h-9 rounded-full bg-[#E4F1F8] hover:bg-[#D9ECF6] flex items-center justify-center transition-colors cursor-pointer"><I.Bell size={16}color="#0B3D62"/>{unread>0&&<span className="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 rounded-full bg-[#B8202E] text-white text-[10px] font-bold flex items-center justify-center">{unread>9?"9+":unread}</span>}</button>{open&&<div className="absolute top-full right-0 mt-2 w-80 bg-white rounded-2xl border border-[#DCEEF7] shadow-2xl overflow-hidden z-50"><div className="px-4 py-3 border-b border-[#E4F1F8]"><p className="text-sm font-bold text-[#0B2B45]">Notificaciones</p><p className="text-xs text-[#6E8DA3]">Nuevas evaluaciones del staff</p></div><div className="max-h-72 overflow-auto">{!rel.length?<p className="text-sm text-[#6E8DA3] px-4 py-6 text-center">No hay novedades</p>:rel.map(n=>{const A=AREAS[n.area],p=players.find(pl=>pl.id===n.playerId);return<button key={n.id}onMouseDown={()=>{if(p)onJump(p);setOpen(false);}}className="w-full flex items-start gap-3 px-4 py-3 hover:bg-[#EAF5FA] text-left border-b border-[#EAF5FA] last:border-0 cursor-pointer"><span className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5"style={{background:`${A.color}1A`}}><I.List size={14}color={A.color}/></span><div className="min-w-0"><p className="text-sm text-[#0B2B45]"><b>{n.evaluadorNombre}</b> evaluó a <b>{n.playerName}</b></p><p className="text-xs text-[#6E8DA3]">{A.label} · {fdt(n.fecha)}</p></div></button>;})}</div></div>}</div>;
}

    </div>

      <Field label="Altura (cm)"><input type="number"value={f.altura}onChange={set("altura")}className="inp"/></Field>
      <Field label="Peso (kg)"><input type="number"value={f.peso}onChange={set("peso")}className="inp"/></Field>
      <Field label="Envergadura (cm)"><input type="number"value={f.envergadura}onChange={set("envergadura")}className="inp"/></Field>
      <Field label="Alcance ataque (cm)"><input type="number"value={f.alcanceAtaque}onChange={set("alcanceAtaque")}className="inp"/></Field>
      <Field label="Alcance bloqueo (cm)"><input type="number"value={f.alcanceBloqueo}onChange={set("alcanceBloqueo")}className="inp"/></Field>
    </div>
    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
      <Field label="Mano dominante"><select value={f.manoDominante}onChange={set("manoDominante")}className="inp">{MANOS.map(m=><option key={m}>{m}</option>)}</select></Field>
      <Field label="Club actual"><input value={f.club}onChange={set("club")}className="inp"/></Field>
      <Field label="Entrenador/a de club"><input value={f.entrenadorClub}onChange={set("entrenadorClub")}className="inp"/></Field>
      <Field label="Teléfono"><input value={f.telefono}onChange={set("telefono")}className="inp"/></Field>
      <Field label="Email"><input value={f.email}onChange={set("email")}className="inp"/></Field>
      <Field label="Localidad / Provincia"><div className="flex gap-2"><input value={f.localidad}onChange={set("localidad")}className="inp"placeholder="Localidad"/><input value={f.provincia}onChange={set("provincia")}className="inp"placeholder="Provincia"/></div></Field>
    </div>
    <Field label="Observaciones generales"className="mt-5"><textarea value={f.observacionesGenerales}onChange={set("observacionesGenerales")}className="inp min-h-[70px]"placeholder="Contexto general, antecedentes, lesiones..."/></Field>
    {miss.length>0&&<div className="flex items-center gap-2 text-[#946C1A] text-xs mt-4 bg-[#946C1A]/10 px-3 py-2 rounded-lg"><I.Alert size={14}color="#946C1A"/> Completá los campos obligatorios (*) para guardar.</div>}
    <div className="flex justify-end gap-2 mt-6"><button onClick={onCancel}className="bs">Cancelar</button><button onClick={()=>onSave(f)}disabled={miss.length>0}className="bp"><I.Save size={15}color="#fff"/> Guardar jugador/a</button></div>
  </div>;
}

/* ═══ FORMULARIO EVALUACIÓN ═══ */
function EForm({player,user,onSave,onCancel}){
  const[tab,setTab]=useState("tecnico"),[vals,setVals]=useState({tecnico:{},fisico:{},mental:{}}),[notas,setNotas]=useState({tecnico:"",fisico:"",mental:""}),[notaG,setNotaG]=useState(""),[adj,setAdj]=useState([]),[sub,setSub]=useState(false);
  const tabs=["tecnico","fisico","mental"],done=a=>AREAS[a].vars.every(v=>vals[a][v.k]),any=tabs.some(done),idx=tabs.indexOf(tab);
  const hF=async list=>{setSub(true);for(const f of Array.from(list)){const isI=f.type.startsWith("image/"),base={id:Date.now()+Math.random(),nombre:f.name,esImagen:isI};if(isI){const url=await upAttach(f);if(url)setAdj(p=>[...p,{...base,url}]);}else setAdj(p=>[...p,base]);}setSub(false);};
  const save=()=>onSave(tabs.filter(a=>Object.keys(vals[a]).length>0).map(a=>({playerId:player.id,area:a,valores:vals[a],evaluadorId:user.id,evaluadorRol:user.rol,nota:notas[a],notaGeneral:notaG,adjuntos:adj})));
  return<div className="bg-white rounded-2xl border border-[#DCEEF7] shadow-sm overflow-hidden">
    <div className="px-6 py-4 border-b border-[#C3E0EE] flex items-center justify-between"><div><h3 className="font-bold text-[#0B2B45]">Nueva evaluación — {player.nombre} {player.apellido}</h3><p className="text-xs text-[#6E8DA3] mt-0.5">Evaluador/a: {user.nombre} · {fd(new Date())}</p></div><button onClick={onCancel}className="text-[#9A9182] hover:text-[#0B2B45] cursor-pointer"><I.X size={20}/></button></div>
    <div className="flex border-b border-[#C3E0EE] bg-[#EAF6FB]">{tabs.map(a=><button key={a}onClick={()=>setTab(a)}className="flex-1 flex items-center justify-center gap-2 py-3.5 text-sm font-semibold border-b-2 transition-colors cursor-pointer"style={{borderColor:tab===a?AREAS[a].color:"transparent",color:tab===a?AREAS[a].color:"#6E8DA3"}}>{AREAS[a].label}{done(a)&&<I.Ck2 size={14}color="#159C6B"/>}</button>)}</div>
    <div className="p-6"><p className="text-xs text-[#6E8DA3] mb-4 bg-[#EAF6FB] rounded-lg px-3 py-2">1=Insuficiente · 2=Regular · 3=Por encima norma · 4=Muy bueno · 5=Excepcional</p>
      <div className="space-y-5">{AREAS[tab].vars.map(v=><div key={v.k}><div className="flex items-center justify-between mb-1.5"><span className="text-sm font-semibold text-[#0B2B45]">{v.l}</span>{vals[tab][v.k]&&<ScoreDot value={vals[tab][v.k]}/>}</div><Slider value={vals[tab][v.k]}onChange={val=>setVals(s=>({...s,[tab]:{...s[tab],[v.k]:val}}))}/></div>)}</div>
      <Field label={`Observación — ${AREAS[tab].label}`}className="mt-6"><textarea value={notas[tab]}onChange={e=>setNotas(s=>({...s,[tab]:e.target.value}))}className="inp min-h-[70px]"placeholder="Anotación sobre este aspecto..."/></Field>
    </div>
    <div className="px-6 pb-6">
      <Field label="Observación general (opcional)"><textarea value={notaG}onChange={e=>setNotaG(e.target.value)}className="inp min-h-[60px]"placeholder="Comentario global de la jornada..."/></Field>
      <div className="mt-4"><span className="block text-xs font-semibold text-[#4F708A] mb-1.5">Adjuntos</span><label className="flex items-center justify-center gap-2 border-2 border-dashed border-[#C3E0EE] hover:border-[#1A8FC1] rounded-xl py-3 cursor-pointer transition-colors text-[#4F708A] hover:text-[#1A8FC1]">{sub?<I.Loader size={15}color="#1A8FC1"/>:<I.Clip size={15}color="currentColor"/>}<span className="text-sm">{sub?"Subiendo...":"Hacé clic para adjuntar"}</span><input type="file"multiple accept="image/*,video/*,.pdf"className="hidden"disabled={sub}onChange={e=>{hF(e.target.files);e.target.value="";;}}/></label>{adj.length>0&&<div className="flex flex-wrap gap-2 mt-2">{adj.map(a=><div key={a.id}className="flex items-center gap-2 bg-[#E4F1F8] border border-[#C3E0EE] rounded-lg pl-2 pr-1 py-1.5">{a.esImagen&&a.url?<img src={a.url}className="w-6 h-6 rounded object-cover"/>:<I.Clip size={13}color="#4F708A"/>}<span className="text-xs text-[#0B2B45] max-w-[100px] truncate">{a.nombre}</span><button onClick={()=>setAdj(p=>p.filter(x=>x.id!==a.id))}className="text-[#9A9182] hover:text-[#B8202E] cursor-pointer"><I.X size={12}/></button></div>)}</div>}</div>
    </div>
    <div className="px-6 py-4 bg-[#EAF6FB] border-t border-[#C3E0EE] flex items-center justify-between">
      <div className="flex gap-2">{idx>0&&<button onClick={()=>setTab(tabs[idx-1])}className="bs"><I.ChevL size={15}/> Anterior</button>}{idx<tabs.length-1&&<button onClick={()=>setTab(tabs[idx+1])}className="bs">Siguiente <I.ChevR size={15}/></button>}</div>
      <div className="flex gap-2"><button onClick={onCancel}className="bs">Cancelar</button><button onClick={save}disabled={!any}className="bp"><I.Save size={15}color="#fff"/> Guardar evaluación</button></div>
    </div>
  </div>;
}

/* ═══ PANEL NOTAS ═══ */
function NotasP({player,notes,user,onAdd,getUser,canWrite}){
  const[text,setText]=useState("");
  const[tipo,setTipo]=useState("nota");
  const[confidencial,setConfidencial]=useState(false);
  const[open,setOpen]=useState(false);
  const[selected,setSelected]=useState(null);
  const[uploadingAdj,setUploadingAdj]=useState(false);
  const[adjuntos,setAdjuntos]=useState([]);

  const ROLE_STYLE={
    admin:    {bg:"#FFF9E6",border:"#E08E1D44",text:"#63380A",sub:"#A07028",av:"#0B3D62"},
    head_coach:{bg:"#E8F5FF",border:"#1A8FC144",text:"#042C53",sub:"#185FA5",av:"#1A8FC1"},
    coach:    {bg:"#EDFAF2",border:"#159C6B44",text:"#04342C",sub:"#0F6E56",av:"#159C6B"},
    scout:    {bg:"#FFF0F0",border:"#D85A3044",text:"#4A1B0C",sub:"#993C1D",av:"#E08E1D"},
  };

  const canSee=note=>{
    if(!note.confidencial)return true;
    const aN=ROLES[note.autorRol]?.nivel??0;
    const uN=ROLES[user.rol]?.nivel??0;
    return uN>=aN||user.id===note.autorId;
  };

  const handleFiles=async list=>{
    setUploadingAdj(true);
    for(const f of Array.from(list)){
      const isImg=f.type.startsWith("image/");
      const base={id:Date.now()+Math.random(),nombre:f.name,esImagen:isImg};
      if(isImg){const url=await upAttach(f);if(url)setAdjuntos(p=>[...p,{...base,url}]);}
      else setAdjuntos(p=>[...p,base]);
    }
    setUploadingAdj(false);
  };

  const guardar=()=>{
    if(!text.trim())return;
    onAdd({playerId:player.id,texto:text,tipo,autorId:user.id,autorRol:user.rol,confidencial,adjuntos});
    setText("");setTipo("nota");setConfidencial(false);setAdjuntos([]);setOpen(false);
  };

  const list=notes.filter(n=>n.playerId===player.id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const visible=list.filter(n=>canSee(n));
  const locked=list.filter(n=>!canSee(n));

  return<div>
    {canWrite&&<div style={{background:"rgba(255,255,255,0.06)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:12,marginBottom:16,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.75)"}}>
        <span style={{display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:500}}>
          <I.Plus size={16} color="rgba(255,255,255,0.6)"/> Agregar nota o devolución
        </span>
        {open?<I.ChevL size={16} color="rgba(255,255,255,0.4)" className="rotate-90"/>:<I.Plus size={16} color="rgba(255,255,255,0.4)"/>}
      </button>
      {open&&<div style={{padding:"0 16px 16px",borderTop:"0.5px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"flex",gap:8,marginTop:12,marginBottom:8}}>
          <select value={tipo} onChange={e=>setTipo(e.target.value)}
            style={{background:"rgba(255,255,255,0.06)",border:"0.5px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"6px 10px",fontSize:12,color:"rgba(255,255,255,0.8)",outline:"none",flex:1}}>
            <option value="nota">Nota personal</option>
            <option value="devolucion">Devolución al jugador/a</option>
          </select>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:"rgba(255,255,255,0.6)"}}>
            <input type="checkbox" checked={confidencial} onChange={e=>setConfidencial(e.target.checked)}
              style={{accentColor:"#E08E1D"}}/>
            <I.Lock size={13} color={confidencial?"#E08E1D":"rgba(255,255,255,0.4)"}/>
            Confidencial
          </label>
        </div>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Escribí tu nota..."
          style={{width:"100%",boxSizing:"border-box",minHeight:80,background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#EAF4FA",outline:"none",resize:"vertical"}}/>
        <div style={{marginTop:8}}>
          <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"1px dashed rgba(255,255,255,0.15)",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:12,color:"rgba(255,255,255,0.45)"}}>
            {uploadingAdj?<I.Loader size={14} color="rgba(255,255,255,0.5)"/>:<I.Clip size={14} color="rgba(255,255,255,0.45)"/>}
            {uploadingAdj?"Subiendo...":"Adjuntar foto o archivo"}
            <input type="file" multiple accept="image/*,.pdf,.doc,.docx" className="hidden" disabled={uploadingAdj}
              onChange={e=>{handleFiles(e.target.files);e.target.value="";}}/>
          </label>
          {adjuntos.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
            {adjuntos.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.08)",borderRadius:6,padding:"4px 8px"}}>
              {a.esImagen&&a.url?<img src={a.url} style={{width:20,height:20,borderRadius:4,objectFit:"cover"}}/>:<I.Clip size={12} color="rgba(255,255,255,0.5)"/>}
              <span style={{fontSize:11,color:"rgba(255,255,255,0.6)",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.nombre}</span>
              <button onClick={()=>setAdjuntos(p=>p.filter(x=>x.id!==a.id))} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)"}}><I.X size={11}/></button>
            </div>)}
          </div>}
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
          <button onClick={guardar} disabled={!text.trim()}
            style={{background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",border:"none",borderRadius:8,padding:"8px 16px",color:"white",fontWeight:500,fontSize:13,cursor:"pointer",opacity:text.trim()?1:0.5}}>
            Guardar nota
          </button>
        </div>
      </div>}
    </div>}

    {!list.length&&<div style={{textAlign:"center",padding:"2rem",color:"rgba(255,255,255,0.3)"}}>
      <I.Note size={32} color="rgba(255,255,255,0.2)"/>
      <p style={{margin:"8px 0 0",fontSize:13}}>No hay notas todavía.</p>
    </div>}

    {(visible.length>0||locked.length>0)&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
      {visible.map(n=>{
        const rs=ROLE_STYLE[n.autorRol]||ROLE_STYLE.scout;
        const ini=getUser(n.autorId).split(" ").map(x=>x[0]).slice(0,2).join("");
        return<div key={n.id} onClick={()=>setSelected(n)}
          style={{background:rs.bg,border:`0.5px solid ${rs.border}`,borderRadius:10,padding:14,cursor:"pointer",transition:"transform .15s"}}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-3px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:rs.av,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:500,color:"white",flexShrink:0}}>{ini}</div>
            <div style={{minWidth:0}}>
              <p style={{fontSize:11,fontWeight:500,color:rs.text,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getUser(n.autorId)}</p>
              <p style={{fontSize:10,color:rs.sub,margin:0}}>{fdt(n.fecha)}</p>
            </div>
            {n.confidencial&&<I.Lock size={12} color={rs.sub} style={{marginLeft:"auto",flexShrink:0}}/>}
            {n.adjuntos?.length>0&&<I.Clip size={12} color={rs.sub} style={{flexShrink:0}}/>}
          </div>
          <p style={{fontSize:12,color:rs.text,margin:"0 0 6px",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{n.texto}</p>
          <span style={{fontSize:10,background:n.confidencial?"#E08E1D22":"rgba(0,0,0,0.06)",color:n.confidencial?rs.sub:rs.sub,padding:"2px 7px",borderRadius:4,border:`0.5px solid ${rs.border}`}}>
            {n.tipo==="devolucion"?"Devolución":"Nota"}{n.confidencial?" · Confidencial":""}
          </span>
        </div>;
      })}

      {locked.map(n=><div key={n.id} style={{background:"rgba(0,0,0,0.2)",border:"0.5px solid rgba(255,255,255,0.08)",borderRadius:10,padding:14,position:"relative",overflow:"hidden"}}>
        <div style={{filter:"blur(3px)",pointerEvents:"none"}}>
          <div style={{height:10,background:"rgba(255,255,255,0.1)",borderRadius:4,marginBottom:8,width:"60%"}}/>
          <div style={{height:8,background:"rgba(255,255,255,0.08)",borderRadius:4,marginBottom:6,width:"90%"}}/>
          <div style={{height:8,background:"rgba(255,255,255,0.08)",borderRadius:4,width:"75%"}}/>
        </div>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:14}}>
          <I.Lock size={20} color="rgba(255,255,255,0.5)"/>
          <p style={{fontSize:11,color:"rgba(255,255,255,0.5)",textAlign:"center",margin:0}}>Nota confidencial del {ROLES[n.autorRol]?.label}</p>
          <button onClick={()=>setSelected({...n,locked:true})}
            style={{fontSize:11,padding:"5px 12px",borderRadius:6,border:"0.5px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.7)",cursor:"pointer"}}>
            Solicitar acceso
          </button>
        </div>
      </div>)}
    </div>}

    {selected&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:"1rem"}}>
      {selected.locked?<div style={{background:"#0B2235",borderRadius:16,padding:"1.5rem",maxWidth:380,width:"100%",border:"0.5px solid rgba(255,255,255,0.1)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(224,142,29,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <I.Lock size={18} color="#E08E1D"/>
          </div>
          <div>
            <p style={{fontSize:14,fontWeight:500,color:"#EAF4FA",margin:0}}>Nota confidencial</p>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",margin:0}}>Creada por {getUser(selected.autorId)}</p>
          </div>
        </div>
        <p style={{fontSize:13,color:"rgba(255,255,255,0.6)",margin:"0 0 16px",lineHeight:1.6}}>Esta nota fue marcada como confidencial. Tu rol actual no tiene acceso automático. Al solicitar acceso, el autor recibirá una notificación.</p>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setSelected(null)} style={{flex:1,padding:"9px",borderRadius:8,border:"0.5px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13}}>Cancelar</button>
          <button onClick={()=>setSelected(null)} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",color:"white",cursor:"pointer",fontSize:13,fontWeight:500}}>Solicitar acceso</button>
        </div>
      </div>:<div style={{background:"#0B2235",borderRadius:16,padding:"1.5rem",maxWidth:440,width:"100%",border:"0.5px solid rgba(255,255,255,0.1)"}}>
        {(()=>{const rs=ROLE_STYLE[selected.autorRol]||ROLE_STYLE.scout;const ini=getUser(selected.autorId).split(" ").map(x=>x[0]).slice(0,2).join("");return<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:rs.av,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:500,color:"white"}}>{ini}</div>
              <div>
                <p style={{fontSize:14,fontWeight:500,color:"#EAF4FA",margin:0}}>{getUser(selected.autorId)}</p>
                <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",margin:0}}>{ROLES[selected.autorRol]?.label} · {fdt(selected.fecha)}</p>
              </div>
            </div>
            <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)"}}><I.X size={18}/></button>
          </div>
          <div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
            <span style={{fontSize:11,fontWeight:500,color:rs.sub}}>
              {selected.tipo==="devolucion"?"Devolución al jugador/a":"Nota personal"}{selected.confidencial?" · Confidencial":""}
            </span>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.85)",margin:"6px 0 0",lineHeight:1.7}}>{selected.texto}</p>
          </div>
          {selected.adjuntos?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",margin:0}}>Adjuntos</p>
            {selected.adjuntos.map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"8px 12px"}}>
              {a.esImagen&&a.url?<img src={a.url} style={{width:28,height:28,borderRadius:4,objectFit:"cover"}}/>:<I.Clip size={16} color="rgba(255,255,255,0.5)"/>}
              <span style={{fontSize:12,color:"rgba(255,255,255,0.7)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.nombre}</span>
              {a.url&&<a href={a.url} target="_blank" rel="noreferrer"
                style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"0.5px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.7)",textDecoration:"none",display:"flex",alignItems:"center",gap:4}}>
                <I.DL size={12} color="rgba(255,255,255,0.7)"/> Abrir
              </a>}
            </div>)}
          </div>}

function PDash({player,evals}){
  const ev=evals.filter(e=>e.playerId===player.id);
  const avgA=a=>{const rel=ev.filter(e=>e.area===a);if(!rel.length)return null;const vs=AREAS[a].vars.map(v=>v.k);const s={},c={};vs.forEach(k=>{s[k]=0;c[k]=0;});rel.forEach(e=>vs.forEach(k=>{if(e.valores[k]){s[k]+=e.valores[k];c[k]++;}}));return vs.map(k=>({k,l:AREAS[a].vars.find(v=>v.k===k).l,v:c[k]?Math.round(s[k]/c[k]*10)/10:0}));};
  const ov=a=>{const d=avgA(a);if(!d)return null;const vv=d.filter(x=>x.v>0).map(x=>x.v);return vv.length?Math.round(vv.reduce((a,b)=>a+b,0)/vv.length*10)/10:null;};
  const scatDS=useMemo(()=>Object.entries(AREAS).map(([k,A])=>{const rel=ev.filter(e=>e.area===k);return{label:A.label,data:rel.map(e=>{const vs=Object.values(e.valores).filter(Boolean);const avg=vs.length?Math.round(vs.reduce((a,b)=>a+b,0)/vs.length*10)/10:null;return avg?{x:new Date(e.fecha).getTime(),y:avg,nota:e.nota}:null;}).filter(Boolean),backgroundColor:A.color+"CC",pointRadius:6};}).filter(d=>d.data.length>0),[ev]);
  const allV=Object.entries(AREAS).flatMap(([k,A])=>A.vars.map(v=>({...v,area:k})));
  const radDS=useMemo(()=>[{label:"General",data:allV.map(v=>{const rel=ev.filter(e=>e.area===v.area);const vv=rel.map(e=>e.valores[v.k]).filter(Boolean);return vv.length?Math.round(vv.reduce((a,b)=>a+b,0)/vv.length*10)/10:0;}),borderColor:"#0B3D62",backgroundColor:"#0B3D6230",borderWidth:2}],[ev]);
  if(!ev.length)return<Empty icon={I.Board}title="Sin evaluaciones aún"desc="Cuando se cargue la primera evaluación el dashboard se completará."/>;
  return<div className="rounded-3xl p-1"style={{background:"linear-gradient(8deg,#0B3D62 0%,#1B5FA8 55%,#1FC9C2 100%)"}}>
    <div className="space-y-6 p-5 rounded-[20px]"style={{background:"linear-gradient(180deg,#EAF6FB 0%,#DCEEF7 100%)"}}>
      <div className="grid grid-cols-3 gap-4">{Object.entries(AREAS).map(([k,A])=>{const avg=ov(k);return<div key={k}className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-4"><p className="text-xs font-bold uppercase tracking-wide mb-2"style={{color:A.color}}>{A.label}</p><p className="text-3xl font-extrabold text-[#0B2B45]">{avg??<span className="text-xl text-[#C3E0EE]">—</span>}</p>{avg&&<div className="flex mt-1">{[1,2,3,4,5].map(n=><I.Star key={n}size={13}color={A.color}filled={n<=Math.round(avg)}/>)}</div>}</div>;})}</div>
      <div className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-5"><div className="flex items-center gap-2 mb-1"><I.Calendar size={16}color="#0B3D62"/><p className="text-sm font-bold text-[#0B2B45]">Línea de tiempo de ingresos</p></div><p className="text-xs text-[#6E8DA3] mb-3">Cada punto es una evaluación. Pasá el mouse para ver el detalle.</p><ScatC datasets={scatDS}/></div>
      <div className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-5"><p className="text-sm font-bold text-[#0B2B45] mb-3">Radar general de variables</p><RadarC datasets={radDS}labels={allV.map(v=>v.l)}/></div>
      {Object.entries(AREAS).map(([k,A])=>{const d=avgA(k);if(!d)return null;return<div key={k}className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-5"><p className="text-sm font-bold mb-3"style={{color:A.color}}>{A.label} — detalle</p><BarC data={d.map(x=>x.v)}labels={d.map(x=>x.l)}color={A.color}/></div>;})}
    </div>
  </div>;
}

/* ═══ HISTORIAL EVALUACIONES ═══ */

}

function PlayersList({players,evals,user,onSelect,onCreate,canCreate,onCompare}){

  const tog=id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):p.length>=3?p:[...p,id]);

    const rel=evals.filter(e=>e.playerId===p.id&&e.area===a);

function CompView({players,evals,onBack}){
  const PC=["#0B3D62","#1A8FC1","#E08E1D"];
  const allV=Object.entries(AREAS).flatMap(([k,A])=>A.vars.map(v=>({...v,area:k})));
  const avgV=(p,ak,vk)=>{const rel=evals.filter(e=>e.playerId===p.id&&e.area===ak);const vv=rel.map(e=>e.valores[vk]).filter(Boolean);return vv.length?Math.round(vv.reduce((a,b)=>a+b,0)/vv.length*10)/10:0;};
  const radDS=players.map((p,i)=>({label:`${p.nombre} ${p.apellido}`,data:allV.map(v=>avgV(p,v.area,v.k)),borderColor:PC[i],backgroundColor:PC[i]+"30",borderWidth:2}));
  const lineA=ak=>{const dates=new Set();players.forEach(p=>evals.filter(e=>e.playerId===p.id&&e.area===ak).forEach(e=>dates.add(e.fecha.slice(0,10))));const sorted=[...dates].sort();if(!sorted.length)return null;const ds=players.map((p,i)=>{const byD={};evals.filter(e=>e.playerId===p.id&&e.area===ak).forEach(e=>{const iso=e.fecha.slice(0,10);const vs=Object.values(e.valores).filter(Boolean);if(vs.length)byD[iso]=Math.round(vs.reduce((a,b)=>a+b,0)/vs.length*10)/10;});return{label:`${p.nombre} ${p.apellido}`,data:sorted.map(d=>byD[d]??null),borderColor:PC[i],backgroundColor:PC[i]+"30",borderWidth:2,spanGaps:true,tension:0.3};});return{labels:sorted.map(fd),datasets:ds};};
  const age=p=>p.fechaNacimiento?Math.floor((Date.now()-new Date(p.fechaNacimiento))/(365.25*24*3600*1000)):"—";
  return<div className="p-8">
    <button onClick={onBack}className="flex items-center gap-1.5 text-sm text-[#4F708A] hover:text-[#0B2B45] mb-4 cursor-pointer"><I.ChevL size={16}/> Volver al listado</button>
    <h2 className="text-xl font-bold text-[#0B2B45] mb-1 flex items-center gap-2"><I.Scale size={19}color="#0B3D62"/> Comparación de jugadores/as</h2>
    <p className="text-sm text-[#6E8DA3] mb-6">{players.length} perfiles con evaluaciones superpuestas.</p>
    <div className="grid gap-4 mb-6"style={{gridTemplateColumns:`repeat(${players.length},1fr)`}}>{players.map((p,i)=><div key={p.id}className="bg-white rounded-2xl border-2 p-5"style={{borderColor:PC[i]}}><div className="flex items-center gap-3 mb-3"><Avatar player={p}size="md"/><div className="min-w-0"><p className="font-bold text-[#0B2B45] truncate">{p.nombre} {p.apellido}</p><p className="text-xs text-[#6E8DA3]">{p.posicion} · {p.categoria}</p></div></div><div className="grid grid-cols-2 gap-y-1 text-xs text-[#4F708A]"><span>Edad: <b className="text-[#0B2B45]">{age(p)}</b></span><span>Altura: <b className="text-[#0B2B45]">{p.altura||"—"} cm</b></span><span>Alcance: <b className="text-[#0B2B45]">{p.alcanceAtaque||"—"} cm</b></span><span>Club: <b className="text-[#0B2B45] truncate">{p.club||"—"}</b></span></div></div>)}</div>
    <div className="bg-white rounded-2xl border border-[#DCEEF7] shadow-sm p-5 mb-6"><p className="text-sm font-bold text-[#0B2B45] mb-1">Radar comparativo — todas las variables superpuestas</p><div className="flex gap-4 mb-3 flex-wrap">{players.map((p,i)=><span key={p.id}className="flex items-center gap-1.5 text-xs font-semibold"style={{color:PC[i]}}><span className="w-2.5 h-2.5 rounded-full"style={{background:PC[i]}}/>{p.nombre} {p.apellido}</span>)}</div><RadarC datasets={radDS}labels={allV.map(v=>v.l)}/></div>
    <div className="space-y-4"><div className="flex items-center gap-2"><I.Activity size={17}color="#0B3D62"/><p className="text-sm font-bold text-[#0B2B45]">Evolución comparada por área</p></div>
    {Object.entries(AREAS).map(([k,A])=>{const ld=lineA(k);if(!ld)return<div key={k}className="bg-white rounded-xl border border-[#DCEEF7] p-4"><p className="text-sm font-bold mb-1"style={{color:A.color}}>{A.label}</p><p className="text-sm text-[#6E8DA3]">Sin evaluaciones para comparar.</p></div>;return<div key={k}className="bg-white rounded-2xl border border-[#DCEEF7] shadow-sm p-5"><p className="text-sm font-bold mb-3"style={{color:A.color}}>{A.label}</p><LineC datasets={ld.datasets}labels={ld.labels}/></div>;})}
    </div>
  </div>;
}

  const dl=(name,content)=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type:"text/csv;charset=utf-8;"}));a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);};
  return<div className="p-8 max-w-4xl">
    <h2 className="text-xl font-bold text-[#0B2B45] mb-1">Informes y exportación</h2>

      <div className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-5"><I.List size={20}color="#1A8FC1"className="mb-2"/><p className="font-bold text-[#0B2B45] text-sm mb-1">Todas las evaluaciones</p><p className="text-xs text-[#6E8DA3] mb-3">Historial completo por área y evaluador.</p><button onClick={()=>dl("evaluaciones.csv",toCSV(evals.map(e=>{const p=players.find(pl=>pl.id===e.playerId);return{Jugador:p?`${p.nombre} ${p.apellido}`:"—",Área:AREAS[e.area].label,Evaluador:getUser(e.evaluadorId),Fecha:fdt(e.fecha),Nota:e.nota||""};;})))}className="bs w-full justify-center"><I.DL size={14}/> CSV</button></div>
      <div className="bg-white rounded-xl border border-[#DCEEF7] shadow-sm p-5"><I.Note size={20}color="#E08E1D"className="mb-2"/><p className="font-bold text-[#0B2B45] text-sm mb-1">Notas y devoluciones</p><p className="text-xs text-[#6E8DA3] mb-3">Todas las notas del staff por jugador.</p><button onClick={()=>dl("notas.csv",toCSV(notes.map(n=>{const p=players.find(pl=>pl.id===n.playerId);return{Jugador:p?`${p.nombre} ${p.apellido}`:"—",Tipo:n.tipo,Autor:getUser(n.autorId),Fecha:fdt(n.fecha),Texto:n.texto};;})))}className="bs w-full justify-center"><I.DL size={14}/> CSV</button></div>
    </div>
    <p className="font-bold text-[#0B2B45] text-sm mb-3">Imprimir ficha individual (PDF)</p>
    <div className="space-y-2">{players.map(p=><div key={p.id}className="flex items-center justify-between bg-white border border-[#DCEEF7] rounded-lg px-4 py-3 shadow-sm"><div><p className="font-semibold text-[#0B2B45] text-sm">{p.nombre} {p.apellido}</p><p className="text-xs text-[#6E8DA3]">{p.categoria} · {p.posicion}</p></div><button onClick={()=>{const w=window.open("","_blank"),pE=evals.filter(e=>e.playerId===p.id),pN=notes.filter(n=>n.playerId===p.id);const sec=Object.entries(AREAS).map(([k,A])=>{const rel=pE.filter(e=>e.area===k);if(!rel.length)return`<p>Sin evaluaciones en ${A.label}.</p>`;const last=rel[0];return`<h3>${A.label}</h3><table border="1"style="border-collapse:collapse"><tr>${A.vars.map(v=>`<th>${v.l}</th>`).join("")}</tr><tr>${A.vars.map(v=>`<td>${last.valores[v.k]||"—"}</td>`).join("")}</tr></table>`;}).join("");w.document.write(`<html><head><title>${p.nombre} ${p.apellido}</title><style>body{font-family:Arial;padding:32px}table{margin:10px 0}th,td{padding:6px 12px;font-size:13px}</style></head><body><h1 style="color:#0B3D62">${p.nombre} ${p.apellido}</h1><p>${p.posicion} · ${p.categoria} · DNI ${p.dni||"—"}</p>${sec}<h3>Notas</h3>${pN.map(n=>`<p><b>${n.tipo}</b>: ${n.texto} (${getUser(n.autorId)}, ${fd(n.fecha)})</p>`).join("")||"<p>Sin notas.</p>"}</body></html>`);w.document.close();w.print();}}className="bs"><I.DL size={14}/> PDF</button></div>)}</div>

function AdminP({players,evals,notes,staff,onUpdateStaff}){
  const[tab,setTab]=useState("usuarios");
  const[editId,setEditId]=useState(null);
  const[editRol,setEditRol]=useState("");
  const[editCat,setEditCat]=useState("");
  const[saving,setSaving]=useState(false);
  const[ok,setOk]=useState("");

  const startEdit=u=>{setEditId(u.id);setEditRol(u.rol);setEditCat(u.categoria);setOk("");};
  const cancelEdit=()=>{setEditId(null);setOk("");};

  const saveEdit=async()=>{
    setSaving(true);
    const{error}=await sb.from("profiles").update({rol:editRol,categoria:editCat}).eq("id",editId);
    setSaving(false);

                </div>
              </div>
              {!isEdit&&<button onClick={()=>startEdit(u)}
                style={{background:"rgba(255,255,255,0.08)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"6px 12px",fontSize:12,color:"rgba(255,255,255,0.6)",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                <I.Edit size={13} color="rgba(255,255,255,0.6)"/> Editar rol
              </button>}
            </div>
            {isEdit&&<div style={{marginTop:12,paddingTop:12,borderTop:"0.5px solid rgba(255,255,255,0.08)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                <div>
                  <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",margin:"0 0 4px",fontWeight:500}}>Rol</p>
                  <select value={editRol} onChange={e=>setEditRol(e.target.value)}
                    style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#EAF4FA",outline:"none"}}>
                    {Object.entries(ROLES).map(([k,r])=><option key={k} value={k}>{r.label}</option>)}
                  </select>
                </div>
                <div>
                  <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",margin:"0 0 4px",fontWeight:500}}>Categoría asignada</p>
                  <select value={editCat} onChange={e=>setEditCat(e.target.value)}
                    style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#EAF4FA",outline:"none"}}>
                    <option value="Todas">Todas</option>
                    {CATS.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={cancelEdit}
                  style={{padding:"7px 14px",borderRadius:8,border:"0.5px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12}}>
                  Cancelar
                </button>
                <button onClick={saveEdit} disabled={saving}
                  style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",color:"white",cursor:"pointer",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:6}}>
                  {saving&&<I.Loader size={13} color="#fff"/>} {saving?"Guardando...":"Guardar cambios"}
                </button>
              </div>
            </div>}
          </div>;
        })}
      </div>
    </div>}

    {tab==="stats"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        {[{l:"Jugadores en base",v:players.length,c:"#3FD0E0",Icon:I.Users},{l:"Evaluaciones totales",v:evals.length,c:"#1A8FC1",Icon:I.List},{l:"Notas del staff",v:notes.length,c:"#E08E1D",Icon:I.Note}]
          .map(s=><div key={s.l} style={{background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:12,padding:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:".06em",fontWeight:500}}>{s.l}</span>
              <span style={{width:30,height:30,borderRadius:8,background:`${s.c}20`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <s.Icon size={15} color={s.c}/>
              </span>
            </div>
            <p style={{fontSize:28,fontWeight:500,color:s.c,margin:0}}>{s.v}</p>
          </div>)}
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:12,padding:14}}>
        <p style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.7)",margin:"0 0 12px"}}>Actividad del staff</p>
        {staff.map(u=>{
          const eC=evals.filter(e=>e.evaluadorId===u.id).length;
          const nC=notes.filter(n=>n.autorId===u.id).length;
          const total=eC+nC;
          const maxTotal=Math.max(...staff.map(s=>evals.filter(e=>e.evaluadorId===s.id).length+notes.filter(n=>n.autorId===s.id).length),1);
          return<div key={u.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:ROLES[u.rol]?.color||"#888",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:"white",flexShrink:0}}>
              {u.nombre.split(" ").map(n=>n[0]).slice(0,2).join("")}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.nombre}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",flexShrink:0,marginLeft:8}}>{eC} eval · {nC} notas</span>
              </div>
              <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${(total/maxTotal)*100}%`,height:"100%",background:ROLES[u.rol]?.color||"#888",borderRadius:3,transition:"width .3s"}}/>
              </div>
            </div>
          </div>;
        })}
      </div>
    </div>}

    {tab==="roles"&&<div>
      <div style={{background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:12,padding:14,marginBottom:12}}>
        {Object.entries(ROLES).map(([k,r])=><div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid rgba(255,255,255,0.06)",padding:"10px 0",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:8,background:`${r.color}20`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:11,fontWeight:500,color:r.color}}>N{r.nivel}</span>
            </div>
            <span style={{fontSize:13,fontWeight:500,color:r.color}}>{r.label}</span>
          </div>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.4)",textAlign:"right",maxWidth:"65%"}}>
            {k==="admin"&&"Acceso total — gestión de usuarios, eliminación y panel de administración"}
            {k==="head_coach"&&"Ve todas las categorías, edita perfiles, carga evaluaciones y ve el dashboard"}
            {k==="coach"&&"Ve y evalúa su categoría asignada, deja notas y ve el dashboard"}
            {k==="scout"&&"Carga jugadores y evaluaciones, deja notas — sin acceso al dashboard"}
          </span>
        </div>)}
      </div>
      <div style={{background:"rgba(224,142,29,0.1)",border:"0.5px solid rgba(224,142,29,0.25)",borderRadius:10,padding:"10px 14px",display:"flex",gap:10}}>
        <I.Alert size={16} color="#E08E1D"/>
        <p style={{fontSize:12,color:"rgba(224,142,29,0.8)",margin:0,lineHeight:1.5}}>
          Para cambiar el rol de un usuario, usá la pestaña "Usuarios del staff". Los cambios se aplican de inmediato — la próxima vez que ese usuario recargue la app, tendrá los nuevos permisos.
        </p>
      </div>
    </div>}
  </div>;
}



/* ═══ APP PRINCIPAL ═══ */
function ResetPassword(){
  const[pass,setPass]=useState("");
  const[pass2,setPass2]=useState("");
  const[err,setErr]=useState("");
  const[ok,setOk]=useState(false);
  const[loading,setL]=useState(false);
  const inputStyle={width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#EAF4FA",outline:"none"};
  const handle=async e=>{
    e.preventDefault();setErr("");
    if(pass.length<6){setErr("La contraseña debe tener al menos 6 caracteres.");return;}
    if(pass!==pass2){setErr("Las contraseñas no coinciden.");return;}
    setL(true);
    const{error}=await sb.auth.updateUser({password:pass});
    setL(false);
    if(error){setErr("No se pudo cambiar la contraseña. Intentá de nuevo.");}
    else{setOk(true);setTimeout(()=>window.location.hash="",1500);}
  };
  if(ok)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#D6E8F5"}}>
    <div style={{background:"#0B2235",borderRadius:18,padding:"2rem",maxWidth:320,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
      <p style={{fontSize:32,margin:"0 0 8px"}}>✅</p>
      <p style={{color:"#34D399",fontSize:15,fontWeight:500,margin:"0 0 4px"}}>Contraseña cambiada</p>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:0}}>Redirigiendo al login...</p>
    </div>
  </div>;
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#D6E8F5",padding:"1.5rem"}}>
    <div style={{width:"100%",maxWidth:320,background:"#0B2235",borderRadius:18,padding:"2rem 1.75rem",boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
      <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
        <FevaMark size={44}/>
        <p style={{fontSize:17,fontWeight:500,color:"#EAF4FA",margin:"10px 0 2px"}}>Nueva contraseña</p>
        <p style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:".1em",textTransform:"uppercase",margin:0}}>FeVA · Observa</p>
      </div>
      <form onSubmit={handle}>
        <div style={{marginBottom:8}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:4,fontWeight:500,display:"block"}}>Nueva contraseña</span>
          <input type="password" required value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mínimo 6 caracteres" style={inputStyle}/>
        </div>
        <div style={{marginBottom:"1.25rem"}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:4,fontWeight:500,display:"block"}}>Repetir contraseña</span>
          <input type="password" required value={pass2} onChange={e=>setPass2(e.target.value)} placeholder="••••••••" style={inputStyle}/>
        </div>
        {err&&<div style={{background:"rgba(217,83,79,0.15)",border:"0.5px solid rgba(217,83,79,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#E07070"}}>{err}</div>}
        <button type="submit" disabled={loading} style={{width:"100%",background:"linear-gradient(135deg,#3FD0E0,#1B5FA8)",border:"none",borderRadius:8,padding:10,color:"white",fontWeight:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {loading&&<I.Loader size={15} color="#fff"/>}{loading?"Guardando...":"Guardar contraseña"}
        </button>
      </form>
    </div>
  </div>;
}

function App(){
  const[session,setSession]=useState(undefined),[user,setUser]=useState(null),[staff,setStaff]=useState([]),[players,setPlayers]=useState([]),[evals,setEvals]=useState([]),[notes,setNotes]=useState([]),[notifs,setNotifs]=useState([]),[loading,setLoading]=useState(true),[view,setView]=useState("dashboard"),[selP,setSelP]=useState(null),[creating,setCreating]=useState(false),[comparing,setComparing]=useState(null),[isRecovery,setIsRecovery]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const{data:L}=sb.auth.onAuthStateChange((event,s)=>{
      setSession(s);
      if(event==="PASSWORD_RECOVERY"){setIsRecovery(true);}
    });
    return()=>L.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(session===undefined)return;
    if(!session){setUser(null);setLoading(false);return;}
    (async()=>{
      setLoading(true);
      const{data:prof,error}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
      if(error||!prof){console.error("No se encontró perfil para este usuario");setUser(null);setLoading(false);return;}
      setUser({id:prof.id,nombre:prof.nombre,rol:prof.rol,categoria:prof.categoria,notifLastSeen:prof.notif_last_seen});
      const fetched=await Promise.all([
        sb.from("players").select("*").order("fecha_ingreso",{ascending:false}),
        sb.from("evaluations").select("*").order("fecha",{ascending:false}),
        sb.from("notes").select("*").order("fecha",{ascending:false}),
        sb.from("notifications").select("*").order("fecha",{ascending:false}).limit(200),
        sb.from("profiles").select("*"),
      ]);
      setPlayers(fetched[0].data?.map(pFD)||[]);
      setEvals(fetched[1].data?.map(eFD)||[]);
      setNotes(fetched[2].data?.map(nFD)||[]);
      setNotifs(fetched[3].data?.map(ntFD)||[]);
      setStaff(fetched[4].data||[]);
      setLoading(false);
    })();
  },[session]);

  const getUser=id=>staff.find(s=>s.id===id)?.nombre||"Usuario";
  const navTo=v=>{setView(v);setSelP(null);setCreating(false);setComparing(null);};
  const jump=p=>{setCreating(false);setComparing(null);setSelP(p);};
  const markSeen=async ts=>{setUser(u=>({...u,notifLastSeen:ts}));await sb.from("profiles").update({notif_last_seen:ts}).eq("id",user.id);};

  const handleCreate=async data=>{
    const{data:row,error}=await sb.from("players").insert({...pTD(data),ingresado_por:user.id}).select().single();
    if(error){alert("Error al guardar jugador");console.error(error);return;}
    const np=pFD(row);setPlayers(p=>[np,...p]);setCreating(false);setSelP(np);
  };
  const handleUpdate=async upd=>{
    const{error}=await sb.from("players").update(pTD(upd)).eq("id",upd.id);
    if(error){alert("Error al guardar cambios");return;}
    setPlayers(p=>p.map(x=>x.id===upd.id?upd:x));setSelP(upd);
  };
  const handleDelete=async id=>{
    const{error}=await sb.from("players").delete().eq("id",id);
    if(error){alert("Error al eliminar");return;}
    setPlayers(p=>p.filter(x=>x.id!==id));setEvals(p=>p.filter(x=>x.playerId!==id));setNotes(p=>p.filter(x=>x.playerId!==id));setSelP(null);
  };
  const handleAddEval=async entries=>{
    const rows=entries.map(e=>({player_id:e.playerId,area:e.area,valores:e.valores,evaluador_id:user.id,evaluador_rol:user.rol,nota:e.nota,nota_general:e.notaGeneral,adjuntos:e.adjuntos||[]}));
    const{data:ins,error}=await sb.from("evaluations").insert(rows).select();
    if(error){alert("Error al guardar evaluación");return;}
    const newE=ins.map(eFD);setEvals(p=>[...newE,...p]);
    const tp=players.find(p=>p.id===entries[0]?.playerId);
    if(tp){const nr=newE.map(e=>({player_id:e.playerId,player_name:`${tp.nombre} ${tp.apellido}`,categoria:tp.categoria,area:e.area,evaluador_id:user.id,evaluador_nombre:user.nombre}));const{data:iN}=await sb.from("notifications").insert(nr).select();if(iN)setNotifs(p=>[...iN.map(ntFD),...p]);}
    setSelP(p=>players.find(x=>x.id===p?.id)||p);
  };
  const handleAddNote=async note=>{
    const{data,error}=await sb.from("notes").insert({player_id:note.playerId,texto:note.texto,tipo:note.tipo,autor_id:user.id,autor_rol:user.rol,confidencial:note.confidencial||false,adjuntos:note.adjuntos||[]}).select().single();
    if(error){alert("Error al guardar nota");return;}
    setNotes(p=>[nFD(data),...p]);
  };

  if(session===undefined||loading)return<div className="min-h-screen flex items-center justify-center bg-[#0B3D62] text-white gap-2"><I.Loader size={18}color="#fff"/> Cargando...</div>;
  if(isRecovery)return<ResetPassword/>;
  if(!session||!user)return<Login/>;
  const canCreate=["admin","head_coach","coach","scout"].includes(user.rol);

  const content=()=>{
    if(comparing)return<CompView players={comparing}evals={evals}onBack={()=>setComparing(null)}/>;
    if(selP)return<PlayerProfile player={selP}user={user}evals={evals}notes={notes}onBack={()=>setSelP(null)}onAddEval={handleAddEval}onAddNote={handleAddNote}onUpdate={handleUpdate}onDelete={handleDelete}getUser={getUser}/>;
    if(creating)return<div className="p-8 max-w-5xl"><button onClick={()=>setCreating(false)}className="flex items-center gap-1.5 text-sm text-[#4F708A] hover:text-[#0B2B45] mb-4 cursor-pointer"><I.ChevL size={16}/> Volver</button><h2 className="text-xl font-bold text-[#0B2B45] mb-4">Nuevo jugador/a observado</h2><PForm canEditCat onCancel={()=>setCreating(false)}onSave={handleCreate}/></div>;
    if(view==="dashboard")return<GenDash players={players}evals={evals}user={user}/>;
    if(view==="players")return<PlayersList players={players}evals={evals}user={user}canCreate={canCreate}onSelect={setSelP}onCreate={()=>setCreating(true)}onCompare={ids=>setComparing(players.filter(p=>ids.includes(p.id)))}/>;
    if(view==="reports")return<Reports players={players}evals={evals}notes={notes}getUser={getUser}/>;
    if(view==="admin")return<AdminP players={players}evals={evals}notes={notes}staff={staff}onUpdateStaff={(id,rol,cat)=>setStaff(s=>s.map(u=>u.id===id?{...u,rol,categoria:cat}:u))}/>;
    return null;
  };

  return<Shell user={user}onLogout={async()=>{await sb.auth.signOut();setSelP(null);setComparing(null);navTo("dashboard");}}view={view}setView={navTo}players={players}onJump={jump}notifications={notifs}lastSeen={user.notifLastSeen}onMark={markSeen}>{content()}</Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
